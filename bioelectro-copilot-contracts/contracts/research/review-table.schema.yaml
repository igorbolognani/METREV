version: 0.1
canonical_owner: bioelectrochem_agent_kit/domain/ontology/research-taxonomy.yml
review_table:
  required_fields:
    - review_id
    - title
    - query
    - status
    - version
    - papers
    - columns
    - extraction_results
  optional_fields:
    - extraction_jobs
    - evidence_packs
enums:
  status:
    allowed: [active, archived]
rules:
  - Each new column creates extraction jobs for existing review papers.
  - Table rows represent source documents, while cells represent validated extraction results.
