version: 0.1
canonical_owner: bioelectrochem_agent_kit/domain/ontology/research-taxonomy.yml
column_definition:
  required_fields:
    - column_id
    - name
    - group
    - type
    - answer_structure
    - instructions
    - output_schema_key
    - output_schema
    - visible
  optional_fields:
    - position
enums:
  type:
    allowed: [metadata, deterministic, llm_extracted, computed]
rules:
  - Columns are structured extraction contracts, not free-text spreadsheet labels.
  - LLM-extracted columns must still validate against output_schema_key and output_schema.
