version: 0.1
canonical_owner: bioelectrochem_agent_kit/domain/ontology/research-taxonomy.yml
paper_metadata:
  required_fields:
    - paper_id
    - source_document_id
    - title
    - source_type
  optional_fields:
    - authors
    - year
    - doi
    - journal
    - publisher
    - source_url
    - pdf_url
    - abstract_text
    - citation_count
    - metadata
rules:
  - Existing ExternalSourceRecord rows remain the canonical source-document backing store.
  - Paper metadata snapshots may be stored for review stability but must not replace source-document provenance.
