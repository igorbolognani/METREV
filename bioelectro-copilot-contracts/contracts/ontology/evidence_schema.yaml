version: 0.4

evidence_registry:
  source_document:
    required_fields:
      - id
      - source_type
      - source_key
      - title
      - raw_payload
    optional_fields:
      - source_url
      - source_category
      - doi
      - publisher
      - journal
      - authors
      - language
      - license
      - access_status
      - published_at
      - as_of
      - pdf_url
      - xml_url
      - abstract_text
      - hash_dedup
      - ingestion_run_id

  catalog_item:
    required_fields:
      - id
      - source_document_id
      - evidence_type
      - title
      - summary
      - strength_level
      - provenance_note
      - review_status
      - source_state
      - applicability_scope
      - extracted_claims
      - tags
      - payload
    optional_fields:
      - claim_count
      - reviewed_claim_count

  evidence_claim:
    required_fields:
      - id
      - source_document_id
      - claim_type
      - content
      - confidence
      - extraction_method
      - extractor_version
      - source_snippet
      - metadata
    optional_fields:
      - catalog_item_id
      - extracted_value
      - unit
      - source_locator
      - page_number
      - reviews
      - ontology_mappings

  claim_review:
    required_fields:
      - id
      - status
    optional_fields:
      - analyst_id
      - analyst_role
      - analyst_note
      - reviewed_at

  ontology_mapping:
    required_fields:
      - id
      - ontology_path
      - mapping_confidence
      - mapped_by
    optional_fields:
      - note

  supplier_product:
    required_fields:
      - id
      - supplier_id
      - product_key
      - display_name
    optional_fields:
      - category
      - trl
      - metadata

  supplier_document:
    required_fields:
      - id
      - supplier_id
      - source_document_id
      - document_type
    optional_fields:
      - product_id
      - note

  evaluation_lineage:
    source_usage_required_fields:
      - id
      - evaluation_id
      - source_document_id
      - usage_type
      - created_at
    source_usage_optional_fields:
      - note
      - runtime_versions
    claim_usage_required_fields:
      - id
      - evaluation_id
      - claim_id
      - usage_type
      - created_at
    claim_usage_optional_fields:
      - note
      - runtime_versions

  workspace_snapshot:
    required_fields:
      - id
      - snapshot_type
      - payload
      - created_at
    optional_fields:
      - evaluation_id
      - case_id
      - runtime_versions

api_payloads:
  external_evidence_catalog_summary:
    required_fields:
      - id
      - title
      - summary
      - evidence_type
      - strength_level
      - review_status
      - source_state
      - source_type
      - provenance_note
      - applicability_scope
      - extracted_claims
      - tags
      - created_at
      - updated_at
    optional_fields:
      - source_category
      - source_url
      - doi
      - publisher
      - published_at
      - claim_count
      - reviewed_claim_count

  external_evidence_catalog_detail:
    inherited_from:
      - external_evidence_catalog_summary
    required_fields:
      - source_document
      - claims
      - supplier_documents
      - payload
      - raw_payload
    optional_fields:
      - abstract_text

  external_evidence_catalog_list_response:
    required_fields:
      - items
      - summary

  external_evidence_bulk_review_request:
    required_fields:
      - ids
      - action
    optional_fields:
      - note

  external_evidence_bulk_review_response:
    required_fields:
      - action
      - attempted_ids
      - succeeded_ids
      - failed
    optional_fields:
      - note

enums:
  evidence_type:
    allowed:
      - literature_evidence
      - internal_benchmark
      - supplier_claim
      - engineering_assumption
      - derived_heuristic

  review_status:
    allowed: [pending, accepted, rejected]

  source_state:
    allowed: [raw, parsed, normalized, reviewed]

  source_type:
    allowed:
      - openalex
      - crossref
      - europe_pmc
      - supplier_profile
      - market_snapshot
      - curated_manifest
      - manual

  access_status:
    allowed: [gold, green, hybrid, bronze, closed, unknown]

  claim_type:
    allowed:
      - metric
      - material
      - architecture
      - condition
      - limitation
      - applicability
      - economic
      - supplier_claim
      - market_signal
      - other

  extraction_method:
    allowed: [manual, llm, regex, ml, import_rule]

  ontology_mapping_source:
    allowed: [auto, analyst, import_rule]

  supplier_document_type:
    allowed:
      - profile
      - datasheet
      - specification
      - certificate
      - market_brief
      - case_study
      - patent_filing
      - report
      - other

  usage_type:
    allowed:
      - attached_input
      - input_support
      - diagnostic_support
      - recommendation_support
      - supplier_support
      - report_citation

  workspace_snapshot_type:
    allowed:
      - dashboard
      - evaluation
      - comparison
      - history
      - evidence_review
      - report
      - export_json
      - export_csv

rules:
  - Supplier claims must never be presented as validated fact without corroboration and explicit review status.
  - Catalog items remain intake-gated until review_status is accepted; parsed or normalized records alone are not intake-ready.
  - Claim extraction must keep source_snippet, extraction_method, and extractor_version explicit so downstream confidence can be challenged.
  - Claim reviews must preserve analyst identity, role, note, and review timestamp when human acceptance posture changes.
  - Ontology mappings remain advisory unless their mapping confidence and mapped_by provenance are preserved.
  - Supplier product records must stay linked to supplier identity and must not bypass source-document provenance when shown in registry or report flows.
  - Evaluation lineage must preserve which source documents and claims were used, not only the flattened typed evidence snapshot.
  - Workspace and export snapshots must keep immutable payloads for replay and audit instead of silently rebuilding historical state from mutable live records.
  - External evidence list, detail, and bulk-review API payloads remain part of the validation-facing contract boundary when they carry review posture or provenance semantics.
