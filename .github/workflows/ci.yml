name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run fast validation matrix
        run: pnpm run validate:fast

      - name: Validate Docker Compose
        run: docker compose config

  validate-local:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run local validation matrix
        run: pnpm run validate:local

      - name: Stop local-view stack
        if: always()
        run: pnpm run local:view:down
