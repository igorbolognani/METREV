version: 0.1
canonical_vocabulary_source:
  properties: bioelectro-copilot-contracts/contracts/ontology/property_dictionary.yaml
normalization_policy:
  principle: Preserve original reported values while adding deterministic normalized values only for supported unit conversions.
  missing_behavior: Use null normalized values and record missing_fields when units or values are absent.
  inference_policy: Do not infer numerical values from prose.

rules:
  - id: research_metric.power_density.mw_m2_to_w_m2
    metric_key: power_density_w_m2
    original_unit: mW/m2
    normalized_unit: W/m2
    multiplier: 0.001
  - id: research_metric.power_density.w_m2_identity
    metric_key: power_density_w_m2
    original_unit: W/m2
    normalized_unit: W/m2
    multiplier: 1
  - id: research_metric.current_density.a_m2_identity
    metric_key: current_density_a_m2
    original_unit: A/m2
    normalized_unit: A/m2
    multiplier: 1
  - id: research_metric.current_density.ma_cm2_to_a_m2
    metric_key: current_density_a_m2
    original_unit: mA/cm2
    normalized_unit: A/m2
    multiplier: 10
  - id: research_metric.coulombic_efficiency.percent_identity
    metric_key: coulombic_efficiency_pct
    original_unit: "%"
    normalized_unit: "%"
    multiplier: 1
  - id: research_metric.cod_removal.percent_identity
    metric_key: cod_removal_pct
    original_unit: "%"
    normalized_unit: "%"
    multiplier: 1
  - id: research_metric.internal_resistance.ohm_identity
    metric_key: internal_resistance_ohm
    original_unit: ohm
    normalized_unit: ohm
    multiplier: 1
  - id: research_metric.voltage.v_identity
    metric_key: voltage_v
    original_unit: V
    normalized_unit: V
    multiplier: 1
  - id: research_metric.voltage.mv_to_v
    metric_key: voltage_v
    original_unit: mV
    normalized_unit: V
    multiplier: 0.001
  - id: research_metric.hydrogen_production.ml_l_d_identity
    metric_key: hydrogen_production_ml_l_d
    original_unit: mL/L/d
    normalized_unit: mL/L/d
    multiplier: 1
  - id: research_metric.hydrogen_yield_mol_mol_identity
    metric_key: hydrogen_yield_mol_mol
    original_unit: mol/mol
    normalized_unit: mol/mol
    multiplier: 1
  - id: research_metric.ammonium_recovery.percent_identity
    metric_key: ammonium_recovery_pct
    original_unit: "%"
    normalized_unit: "%"
    multiplier: 1
  - id: research_metric.conductivity.ms_cm_identity
    metric_key: conductivity_ms_cm
    original_unit: mS/cm
    normalized_unit: mS/cm
    multiplier: 1
  - id: research_metric.organic_loading.kg_cod_m3_d_identity
    metric_key: organic_loading_kg_cod_m3_d
    original_unit: kgCOD/m3/d
    normalized_unit: kgCOD/m3/d
    multiplier: 1
  - id: research_metric.hrt.hours_identity
    metric_key: hydraulic_retention_time_h
    original_unit: h
    normalized_unit: h
    multiplier: 1
  - id: research_metric.electrode_potential.mv_to_v
    metric_key: electrode_potential_v
    original_unit: mV
    normalized_unit: V
    multiplier: 0.001
  - id: research_metric.current_efficiency.percent_identity
    metric_key: current_efficiency_pct
    original_unit: "%"
    normalized_unit: "%"
    multiplier: 1
  - id: research_metric.energy_input.kwh_m3_identity
    metric_key: energy_input_kwh_m3
    original_unit: kWh/m3
    normalized_unit: kWh/m3
    multiplier: 1
  - id: research_metric.product_selectivity.percent_identity
    metric_key: product_selectivity_pct
    original_unit: "%"
    normalized_unit: "%"
    multiplier: 1
  - id: research_metric.durability.days_identity
    metric_key: durability_d
    original_unit: days
    normalized_unit: days
    multiplier: 1
  - id: research_metric.trl.identity
    metric_key: trl
    original_unit: TRL
    normalized_unit: TRL
    multiplier: 1
