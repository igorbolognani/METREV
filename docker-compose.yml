services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '${JAEGER_UI_PORT:-16686}:16686'
      - '${OTLP_HTTP_PORT:-4318}:4318'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrev}
      POSTGRES_USER: ${POSTGRES_USER:-metrev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-metrev} -d ${POSTGRES_DB:-metrev}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      METREV_STORAGE_MODE: postgres
      AUTH_SECRET: ${AUTH_SECRET:-metrev-local-dev-auth-secret-change-me-now}
      METREV_OTEL_ENABLED: ${METREV_OTEL_ENABLED:-true}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://metrev:metrev@postgres:5432/metrev?schema=public}
      DIRECT_URL: ${DOCKER_DIRECT_URL:-postgresql://metrev:metrev@postgres:5432/metrev?schema=public}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${DOCKER_OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - '${API_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-metrev-local-dev-auth-secret-change-me-now}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://metrev:metrev@postgres:5432/metrev?schema=public}
      DIRECT_URL: ${DOCKER_DIRECT_URL:-postgresql://metrev:metrev@postgres:5432/metrev?schema=public}
      METREV_OTEL_ENABLED: ${METREV_OTEL_ENABLED:-true}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${DOCKER_OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres-data:
